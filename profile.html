<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Records</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="topbar-logo">
  <img src="IMAGES/LOGO.png" class="main-logo" alt="Logo">

    </div>
  </div>

  <div class="user-bar">
    <a href="profile.html" id="currentUserLabel" class="user-link"></a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar collapsed" id="sidebar">
    <nav>
      <a href="dashboard.html">
        <img src="IMAGES/home.png" class="nav-icon">
        <span class="text">Dashboard</span>
      </a>

      <a href="students.html">
        <img src="IMAGES/students.png" class="nav-icon">
        <span class="text">Students</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <h2>Patient Records</h2>

    <!-- STUDENT MEDICAL INFO -->
    <div class="card">

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3>Student Medical Information</h3>
        <button class="btn primary" onclick="enableEditMode()">Edit</button>
      </div>

      <div class="medical-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">

        <div>
          <label>Name</label>
          <input id="edit_name" disabled>
        </div>

        <div>
          <label>Student No</label>
          <input id="edit_studentNo" disabled>
        </div>

        <div>
          <label>Grade</label>
          <input id="edit_gradeLevel" disabled>
        </div>

        <div>
          <label>Section</label>
          <input id="edit_section" disabled>
        </div>

        <div>
          <label>Sex</label>
          <input id="edit_sex" disabled>
        </div>

        <div>
          <label>Age</label>
          <input id="edit_age" disabled>
        </div>

        <div>
          <label>Birth Date</label>
          <input type="date" id="edit_birthDate" disabled>
        </div>

        <div>
          <label>Address</label>
          <input id="edit_address" disabled>
        </div>

        <div>
          <label>Guardian</label>
          <input id="edit_guardian" disabled>
        </div>

        <div>
          <label>Contact</label>
          <input id="edit_contact" disabled>
        </div>

      </div>

      <!-- AILMENTS -->
      <div style="margin-top:25px;">
        <strong>Ailments</strong>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">

          <label><input type="checkbox" class="edit-ailment" value="Epilepsy" disabled> Epilepsy</label>
          <label><input type="checkbox" class="edit-ailment" value="Frequent colds" disabled> Frequent colds</label>

          <label><input type="checkbox" class="edit-ailment" value="Frequent headache" disabled> Frequent headache</label>
          <label><input type="checkbox" class="edit-ailment" value="Asthma" disabled> Asthma</label>

          <label><input type="checkbox" class="edit-ailment" value="Diabetes" disabled> Diabetes</label>
          <label><input type="checkbox" class="edit-ailment" value="Anemia" disabled> Anemia</label>

          <label><input type="checkbox" class="edit-ailment" value="Dizziness" disabled> Dizziness</label>
          <label><input type="checkbox" class="edit-ailment" value="Hepatitis" disabled> Hepatitis</label>

        </div>
      </div>

      <div style="margin-top:20px;">
        <button id="saveMedicalBtn"
                class="btn primary"
                onclick="updateMedicalInfo()"
                style="display:none;">
          Save Changes
        </button>
      </div>

    </div>

    <!-- CLINIC RECORDS -->
    <div class="card">
      <h3>Clinic Visit Records</h3>

      <table class="records-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Chief Complaint</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="recordsTable"></tbody>
      </table>
    </div>

  </main>
</div>

<script src="js/app.js"></script>

<script>
  loadRecords();
  loadCurrentUser();
  setActiveSidebarLink();
  loadStudentMedicalInfo();
</script>

</body>
</html>
