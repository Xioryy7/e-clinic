<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Clinic Visit</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">

  <div class="topbar-left">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="topbar-logo">
  <img src="IMAGES/LOGO.png" class="main-logo" alt="Logo">

      
    </div>
  </div>

  <div class="user-bar">
    <a href="profile.html" id="currentUserLabel" class="user-link"></a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar collapsed" id="sidebar">
  <nav>
    <a href="dashboard.html">
      <img src="IMAGES/home.png" class="nav-icon" alt="Dashboard">
      <span class="text">Dashboard</span>
    </a>

    <a href="students.html">
      <img src="IMAGES/students.png" class="nav-icon" alt="Students">
      <span class="text">Students</span>
    </a>
  </nav>
</aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <h2>Clinic Visit Entry</h2>

    <div class="card">

      <div class="form-grid">

        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="visitDate">
        </div>

        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="studentId" readonly>
        </div>

        <div class="form-group">
          <label>Temperature</label>
          <input type="text" id="temp">
        </div>

        <div class="form-group">
          <label>Pulse Rate</label>
          <input type="text" id="pr">
        </div>

        <div class="form-group">
          <label>Respiratory Rate</label>
          <input type="text" id="rr">
        </div>

        <div class="form-group">
          <label>Oxygen</label>
          <input type="text" id="o2">
        </div>

        <div class="form-group">
          <label>Pain Score</label>
          <input type="text" id="pain">
        </div>

        <div class="form-group">
          <label>Chief Complaint</label>
          <input type="text" id="complaint">
        </div>

      </div>

      <div class="form-group">
        <label>Intervention</label>
        <textarea id="intervention" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="Incomplete">Incomplete</option>
          <option value="Complete">Complete</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn primary" onclick="updateRecord()">Save Changes</button>
        <button type="button" 
          class="btn danger" 
          onclick="deleteRecord()">
          Delete Entry
        </button>

        <button class="btn gray" onclick="history.back()">Cancel</button>
      </div>

    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", loadSelectedRecord);
  loadCurrentUser();
  setActiveSidebarLink();
</script>

</body>
</html>
